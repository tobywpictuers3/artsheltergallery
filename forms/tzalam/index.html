<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>הסכם צלם — גלאט ארט</title>
<meta http-equiv="refresh" content="0; url=REPLACE_WITH_PHOTOGRAPHER_FORM_URL">
<meta name="robots" content="noindex, nofollow">
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700&family=Heebo:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root { --cream:#F5F0E8; --dark:#1C1A17; --gold:#C9A84C; --warm-gray:#7A6048; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--cream); color:var(--dark); font-family:'Heebo',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
  .box { text-align:center; max-width:420px; }
  .logo-mark { width:64px; height:64px; border:2px solid var(--gold); border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 24px; font-family:'Frank Ruhl Libre',serif; font-size:22px; font-weight:700; color:var(--gold); }
  h1 { font-family:'Frank Ruhl Libre',serif; font-size:24px; font-weight:700; margin-bottom:12px; }
  .form-name { font-size:18px; color:var(--gold); margin-bottom:24px; font-weight:500; }
  .spinner { width:32px; height:32px; border:3px solid rgba(201,168,76,0.2); border-top-color:var(--gold); border-radius:50%; margin:0 auto 20px; animation:spin 0.8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  p { font-size:14px; color:var(--warm-gray); line-height:1.7; margin-bottom:8px; }
  .manual-link { display:inline-block; margin-top:20px; padding:12px 24px; background:var(--dark); color:var(--cream); text-decoration:none; border-radius:8px; font-size:14px; font-weight:500; transition:opacity 0.2s; }
  .manual-link:hover { opacity:0.85; }
  .footer { margin-top:32px; padding-top:20px; border-top:1px solid rgba(201,168,76,0.25); font-size:12px; color:var(--warm-gray); }
</style>
</head>
<body>
<div class="box">
  <div class="logo-mark">גא</div>
  <h1>גלאט ארט — גלריית המקלט</h1>
  <p class="form-name">הסכם צלם</p>
  <div class="spinner"></div>
  <p>מעבירה אותך לטופס...</p>
  <p style="font-size:12px; opacity:0.7;">אם המעבר לא קורה אוטומטית, לחץ/י כאן:</p>
  <a class="manual-link" href="REPLACE_WITH_PHOTOGRAPHER_FORM_URL">פתיחת הטופס</a>
  <div class="footer">
    גלאט ארט — גלריית המקלט<br>
    toby@artsheltergallery.com
  </div>
</div>
<script>
  // גיבוי ל-meta refresh — מבצע ניווט מיידי
  window.location.replace("REPLACE_WITH_PHOTOGRAPHER_FORM_URL");
</script>
</body>
</html>
